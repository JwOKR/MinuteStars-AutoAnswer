<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案一预览 - 经典新拟态 UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ==================== 方案一：经典新拟态核心样式 ==================== */
    :root {
      --nm-bg: #e0e5ec;
      --nm-shadow-light: #ffffff;
      --nm-shadow-dark: #b8bec7;
      --nm-text: #5a6a7a;
      --nm-text-secondary: #9ca3af;
      --nm-accent: #5a8dee;
      --nm-success: #48bb78;
      --nm-danger: #f87171;
      --nm-warning: #fbbf24;
      --nm-radius: 12px;
      --nm-radius-lg: 20px;
    }

    .container { max-width: 400px; margin: 0 auto; }
    h1 { text-align: center; color: #5a6a7a; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
    .desc { text-align: center; color: #9ca3af; margin-bottom: 40px; font-size: 13px; }

    #ata-panel {
      background: var(--nm-bg);
      color: var(--nm-text);
      border-radius: var(--nm-radius-lg);
      padding: 0;
      font-size: 13px;
      width: 340px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      box-shadow: 
        8px 8px 16px var(--nm-shadow-dark),
        -8px -8px 16px var(--nm-shadow-light);
    }

    /* 顶部标题栏 */
    .ata-hdr {
      padding: 16px 18px 14px;
      background: linear-gradient(145deg, #d4d9e2, #ebeff5);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .ata-hdr-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--nm-radius);
      background: linear-gradient(145deg, #5a8dee, #4a7cdd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      box-shadow: 4px 4px 8px var(--nm-shadow-dark), -2px -2px 6px var(--nm-shadow-light);
    }
    .ata-hdr-txt { flex: 1; }
    .ata-hdr-title { font-size: 15px; font-weight: 600; color: #4a5568; }
    .ata-hdr-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .ata-hdr-ver {
      font-size: 10px;
      color: #7a8a9a;
      background: var(--nm-bg);
      border-radius: 20px;
      padding: 4px 12px;
      font-weight: 600;
      box-shadow: inset 2px 2px 4px var(--nm-shadow-dark), inset -2px -2px 4px var(--nm-shadow-light);
    }
    .ata-close-btn {
      width: 30px;
      height: 30px;
      border-radius: var(--nm-radius);
      border: none;
      cursor: pointer;
      background: var(--nm-bg);
      color: #7a8a9a;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 8px var(--nm-shadow-dark), -4px -4px 8px var(--nm-shadow-light);
      transition: box-shadow .15s;
    }
    .ata-close-btn:hover {
      box-shadow: 3px 3px 6px var(--nm-shadow-dark), -3px -3px 6px var(--nm-shadow-light);
    }
    .ata-close-btn:active {
      box-shadow: inset 3px 3px 6px var(--nm-shadow-dark), inset -3px -3px 6px var(--nm-shadow-light);
    }

    /* 统计卡片区 */
    .ata-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 14px;
    }
    .ata-stat-card {
      background: var(--nm-bg);
      border-radius: var(--nm-radius);
      padding: 12px 6px;
      text-align: center;
      box-shadow: 3px 3px 6px var(--nm-shadow-dark), -3px -3px 6px var(--nm-shadow-light);
    }
    .ata-stat-card .num { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .ata-stat-card .lab { font-size: 10px; color: var(--nm-text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .ata-stat-card.green .num { color: var(--nm-success); }
    .ata-stat-card.red .num { color: var(--nm-danger); }
    .ata-stat-card.blue .num { color: var(--nm-accent); }

    /* 进度条 */
    .ata-prog-wrap { padding: 10px 16px 6px; }
    .ata-prog-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ata-prog-label { font-size: 12px; color: var(--nm-text); }
    .ata-prog-pct { font-size: 13px; font-weight: 600; color: var(--nm-accent); }
    .ata-prog {
      height: 10px;
      background: var(--nm-bg);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 3px 3px 6px var(--nm-shadow-dark), inset -3px -3px 6px var(--nm-shadow-light);
    }
    .ata-prog-bar {
      height: 100%;
      border-radius: 10px;
      width: 0;
      transition: width .5s ease;
      background: linear-gradient(90deg, var(--nm-accent), #4a7cdd);
      box-shadow: 2px 2px 4px var(--nm-shadow-dark);
    }

    /* 状态条 */
    .ata-status-bar {
      margin: 8px 14px 10px;
      background: var(--nm-bg);
      border-radius: var(--nm-radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      box-shadow: inset 3px 3px 6px var(--nm-shadow-dark), inset -3px -3px 6px var(--nm-shadow-light);
    }
    .ata-status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--nm-bg);
      box-shadow: 2px 2px 4px var(--nm-shadow-dark), -2px -2px 4px var(--nm-shadow-light);
    }
    .ata-status-dot.running {
      background: var(--nm-accent);
      box-shadow: inset 2px 2px 4px rgba(0,0,0,.2), inset -2px -2px 4px rgba(255,255,255,.5);
      animation: ata-pulse 1.5s infinite;
    }
    @keyframes ata-pulse { 0%, 100% { opacity: 1 } 50% { opacity: .5 } }
    .ata-status-text { color: var(--nm-text-secondary); flex: 1; }
    .ata-status-text span { color: var(--nm-text); font-weight: 600; }

    /* 操作按钮区 */
    .ata-actions { padding: 6px 14px 14px; }
    .ata-btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .ata-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--nm-bg);
      color: var(--nm-text);
      border: none;
      border-radius: var(--nm-radius);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 5px 5px 10px var(--nm-shadow-dark), -5px -5px 10px var(--nm-shadow-light);
      transition: all .15s ease;
      cursor: pointer;
    }
    .ata-btn:hover {
      box-shadow: 4px 4px 8px var(--nm-shadow-dark), -4px -4px 8px var(--nm-shadow-light);
    }
    .ata-btn:active {
      box-shadow: inset 4px 4px 8px var(--nm-shadow-dark), inset -4px -4px 8px var(--nm-shadow-light);
    }
    .ata-btn.green { color: var(--nm-success); }
    .ata-btn.red { color: var(--nm-danger); }
    .ata-btn.blue { color: var(--nm-accent); }
  </style>
</head>
<body>

<div class="container">
  <h1>方案一预览</h1>
  <p class="desc">经典新拟态 · 柔和灰蓝 · 立体阴影</p>

  <!-- 主面板模拟 -->
  <div id="ata-panel" style="margin: 0 auto;">
    <div class="ata-hdr">
      <div class="ata-hdr-icon">🤖</div>
      <div class="ata-hdr-txt">
        <div class="ata-hdr-title">MinuteStars 答题器</div>
        <div class="ata-hdr-sub">题库 327 条 · v4.5.20</div>
      </div>
      <span class="ata-hdr-ver">v4.5.20</span>
      <button class="ata-close-btn">×</button>
    </div>

    <div class="ata-stats">
      <div class="ata-stat-card blue">
        <div class="num">26</div>
        <div class="lab">总题数</div>
      </div>
      <div class="ata-stat-card green">
        <div class="num">17</div>
        <div class="lab">已答题</div>
      </div>
      <div class="ata-stat-card green">
        <div class="num">15</div>
        <div class="lab">命中</div>
      </div>
      <div class="ata-stat-card red">
        <div class="num">2</div>
        <div class="lab">未命中</div>
      </div>
    </div>

    <div class="ata-prog-wrap">
      <div class="ata-prog-meta">
        <span class="ata-prog-label">答题进度</span>
        <span class="ata-prog-pct">65%</span>
      </div>
      <div class="ata-prog">
        <div class="ata-prog-bar" id="progBar"></div>
      </div>
    </div>

    <div class="ata-status-bar">
      <div class="ata-status-dot running"></div>
      <div class="ata-status-text">状态：<span>答题中</span></div>
    </div>

    <div class="ata-actions">
      <div class="ata-btn-row">
        <button class="ata-btn green">▶ 开始答题</button>
        <button class="ata-btn blue">⏸ 暂停</button>
        <button class="ata-btn red">⏹ 停止</button>
      </div>
    </div>
  </div>
</div>

<script>
  setTimeout(() => {
    document.getElementById('progBar').style.width = '65%';
  }, 300);
</script>

</body>
</html>
