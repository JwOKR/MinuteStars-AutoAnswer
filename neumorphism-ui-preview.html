<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新拟态 UI 设计预览</title>
<style>
/* 方案一：经典新拟态（Light） */
:root {
  --bg: #e0e5ec;
  --shadow-light: #ffffff;
  --shadow-dark: #a3b1c6;
  --text: #4a5568;
  --accent: #667eea;
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', sans-serif; }
body { 
  min-height: 100vh; 
  background: var(--bg); 
  display: flex; 
  justify-content: center; 
  align-items: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
}

.card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: 
    10px 10px 20px var(--shadow-dark),
    -10px -10px 20px var(--shadow-light);
  width: 320px;
  color: var(--text);
}

.card.dark {
  --bg: #2d3748;
  --shadow-light: #3d4a5c;
  --shadow-dark: #1a202c;
  --text: #e2e8f0;
  --accent: #63b3ed;
}

.card.accent {
  --bg: #f0f4f8;
  --shadow-light: #ffffff;
  --shadow-dark: #cbd5e0;
  --accent: #48bb78;
}

.card h2 {
  text-align: center;
  margin-bottom: 24px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* 统计卡片 */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 24px;
}

.stat-box {
  background: var(--bg);
  border-radius: 12px;
  padding: 15px 10px;
  text-align: center;
  box-shadow: 
    5px 5px 10px var(--shadow-dark),
    -5px -5px 10px var(--shadow-light);
}

.stat-box .num {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}

.stat-box .lab {
  font-size: 11px;
  margin-top: 4px;
  opacity: 0.7;
}

/* 开关 */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding: 15px 20px;
  background: var(--bg);
  border-radius: 12px;
  box-shadow: 
    inset 4px 4px 8px var(--shadow-dark),
    inset -4px -4px 8px var(--shadow-light);
}

.toggle {
  width: 50px;
  height: 26px;
  background: var(--bg);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  box-shadow: 
    3px 3px 6px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
  transition: all 0.3s;
}

.toggle::after {
  content: '';
  position: absolute;
  width: 22px;
  height: 22px;
  background: var(--bg);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  box-shadow: 
    2px 2px 4px var(--shadow-dark),
    -2px -2px 4px var(--shadow-light);
  transition: all 0.3s;
}

.toggle.active::after {
  left: 26px;
  background: var(--accent);
}

/* 按钮 */
.btn-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 
    5px 5px 10px var(--shadow-dark),
    -5px -5px 10px var(--shadow-light);
  transition: all 0.2s;
}

.btn:hover {
  box-shadow: 
    3px 3px 6px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
}

.btn:active, .btn.active {
  box-shadow: 
    inset 3px 3px 6px var(--shadow-dark),
    inset -3px -3px 6px var(--shadow-light);
}

.btn.green { color: #48bb78; }
.btn.red { color: #fc8181; }
.btn.blue { color: var(--accent); }

/* 输入框 */
.input {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  box-shadow: 
    inset 4px 4px 8px var(--shadow-dark),
    inset -4px -4px 8px var(--shadow-light);
  outline: none;
}

/* 进度条 */
.progress-bar {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  margin: 15px 0;
  box-shadow: 
    inset 2px 2px 4px var(--shadow-dark),
    inset -2px -2px 4px var(--shadow-light);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 65%;
  background: linear-gradient(90deg, var(--accent), #764ba2);
  border-radius: 4px;
  transition: width 0.5s;
}

/* 页脚 */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  opacity: 0.5;
}

/* 标签页 */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  box-shadow: 
    3px 3px 6px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
  transition: all 0.2s;
}

.tab.active {
  box-shadow: 
    inset 3px 3px 6px var(--shadow-dark),
    inset -3px -3px 6px var(--shadow-light);
  color: var(--accent);
}

/* 标签选择器 */
select {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  box-shadow: 
    inset 4px 4px 8px var(--shadow-dark),
    inset -4px -4px 8px var(--shadow-light);
  outline: none;
  margin-bottom: 12px;
  cursor: pointer;
}

/* 方案标题 */
.scheme-title {
  text-align: center;
  width: 100%;
  margin-bottom: 10px;
  font-size: 14px;
  color: var(--text);
  opacity: 0.6;
}
</style>
</head>
<body>

<p class="scheme-title">方案一：经典新拟态（浅色）</p>
<div class="card">
  <h2>🎯 自动答题助手</h2>
  
  <div class="tabs">
    <div class="tab">统计</div>
    <div class="tab active">导入</div>
    <div class="tab">浏览</div>
    <div class="tab">导出</div>
  </div>
  
  <div class="toggle-row">
    <span>自动答题</span>
    <div class="toggle active" onclick="this.classList.toggle('active')"></div>
  </div>
  
  <div class="stats">
    <div class="stat-box">
      <div class="num">256</div>
      <div class="lab">题库总数</div>
    </div>
    <div class="stat-box">
      <div class="num">92%</div>
      <div class="lab">正确率</div>
    </div>
    <div class="stat-box">
      <div class="num">1.2k</div>
      <div class="lab">已答</div>
    </div>
  </div>
  
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  
  <select>
    <option>全部题目</option>
    <option>内置题库</option>
    <option>自定义题库</option>
  </select>
  
  <input type="text" class="input" placeholder="🔍 搜索题目...">
  
  <div class="btn-row" style="margin-top: 16px;">
    <button class="btn green">✅ 导入</button>
    <button class="btn blue">📂 文件</button>
    <button class="btn red">🗑 清空</button>
  </div>
  
  <div class="footer">v4.5.19 · MinuteStars</div>
</div>

<div class="card accent">
  <h2>🎯 自动答题助手</h2>

<script>
// 让标签页可以切换
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    this.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
